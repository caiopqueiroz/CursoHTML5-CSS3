<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div {
            background-color: lightgray;
            text-align: center;
            height: 200px;
            width: 200px;
            margin: auto;
            border: 1px solid black;
            display: inline-block;
            padding: 5px;
        }

        /*
        ':' representam uma pseudo-classe
        Elas tem efeito de acordo com o estado. Exemplo: A cor vai mudar quando o usuário passar o mouse no elemento 
        Sob o mouse = estado
        */

        div:hover /* 'hover' significa: 'sob o mouse' */ {
            background-color:yellow;
        }
    </style>
</head>
<body>
    <div id="d1"> <!-- Tag 'div' representa um espaço qualquer -->
        01
    </div>
    <div id="d2">
        02
    </div>
    <div id="d3">
        03
    </div>
</body>
</html>
