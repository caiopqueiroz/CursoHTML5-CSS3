<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /* Seletores Personalizados
        #   = id
        .   = class
        :   = pseudo-class
        ::  = pseudo-element
        >   = children
        */
        
        /*
        Pseudo-classes definem alterações de acordo com os diferentes estados
        Pseudo-elementos servem para adicionar algo à um conjunto de elementos da mesma categoria, como a identificação de um link, por exemplo, todo link terá a informação x escrita junto dele
        */
        
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color:red;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover /* Sob o mouse */ {
            color:black;
            text-decoration: underline;
            
        }

        a:visited /* Link já visitado */ {
            color:darkred;
        }

        a:active /* Sob clique do mouse (segurando o botão) */ {
            color:yellow;
        }

        .especial::after {
            content: ' <-';
            text-decoration: none;
            font-weight: bold;
            color: darkgray;
        }

        .especial::before {
            content: '-> ';
            text-decoration: none;
            font-weight: bold;
            color: darkgray;
        }

        .especial {
            background-color:rgb(255, 184, 184);
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank" rel="external">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank" rel="external" class="especial">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank" rel="external">Site do CursoemVídeo</a></li>
    </ul>
</body>
</html>
