<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Semântica</title>
    <style> 
        body {
            background-color: blue;
        }
        /*
        Ferramentas de estilo devem ser feitas através de CSS dentro da tag 'style'
        */
    </style>
</head>
<body>
    <p>
        Eu moro na <address>Rua dos Capixabas, 229 - Botafogo - RJ</address> <!-- Ferramenta pra mostrar endereços -->
        <!-- HTML5 não se foca em forma, somente em semântica, tudo tem que ter um significado além do estético -->
    </p>
    
</body>
</html>
