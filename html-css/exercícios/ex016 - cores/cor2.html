<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        /* Cores Capa Pokémon Blue
        #BF2A37 - Vinho
        #2E338C - Azul escuro
        #049DBF - Ciano
        #F2B807 - Dourado
        #F2F2F2 - Cinza claro
        
        Degradê Capa Pokémon Blue
        #5175AA
        #C2A92E
        #8A90B5
        */ 

        /* 
        
        * {
             Configurações globais das CSS 
            height: 100%; 
        }
        
        */
        
        body {
            /* background-color:#049DBF; */
            background-image: linear-gradient(30deg, #FFB400, #FE6103, #FF0A39, #FD00BA 50%, #8903FB);
            /* Mudar a angulação do degradê usando graus (exemplo: 45deg = 45°) */
            background-attachment: fixed;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>
        Testando Gradiente
    </h1>
    <h2>
        Esse é o Gradiente de Cores do Instagram
    </h2>
    
</body>
</html>
