<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Imagens</title>
</head>
<body>
    <h1>
        Testando Carga e Imagens
    </h1>
    <p>
        Abaixo você vai ver uma imagem que está na mesma pasta.
    </p>
    <img src="logo-html-200.png" alt="Logo HTML5"> <!-- Forma mais simples de se exibir uma imagem / alt="" é um campo pra explicar o conteúdo da imagem --> 
    <p>
        Podemos carregar também imagens que estão em sub-pastas.
    </p>
    <img src="imagens/logo-css-200.png" alt="Logo CSS3"> <!-- Forma de carregar imagens de outras pastas, mostrando o caminho antes do nome do arquivo -->
    <p>
        Podemos também carregar imagens externas. 
    </p>
    <img src="https://hcode-public.nyc3.digitaloceanspaces.com/courses/JSFULL/logo_1632447024880.svg" alt="Logo JavaScript"> <!-- Forma de carregar imagens direto de uma URL da internet (copiar e colar endereço da imagem) -->
</body>
</html>
